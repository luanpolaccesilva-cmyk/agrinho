<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Forte, Futuro Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="jogo-container">
        <h2>Agro Forte: Equilíbrio Sustentável</h2>
        
        <div id="painel">
            <p>Produção (Alimentos): <span id="producao">0</span></p>
            <p>Saúde do Meio Ambiente: <span id="ambiente">100</span>%</p>
        </div>

        <div id="fazenda">
            </div>

        <div id="controles">
            <button onclick="colherAlimento()">🌾 Colher Alimento (+Produção)</button>
            <button onclick="plantarArvore()">🌳 Plantar Árvore (+Ambiente)</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
